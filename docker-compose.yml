services:
  app:
    build: .
    entrypoint: ["/bin/sh", "/var/www/html/docker/entrypoint.sh"]
    command: ["php-fpm"]
    volumes:
      - .:/var/www/html
    environment:
      APP_URL: http://localhost:8080
      SESSION_DRIVER: file
      SESSION_SECURE_COOKIE: "false"
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    environment:
      APP_URL: http://localhost:8080
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: guard_saas
      MYSQL_USER: guardops
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  horizon:
    build: .
    entrypoint: ["/bin/sh", "/var/www/html/docker/entrypoint.sh"]
    command: php artisan queue:work --sleep=1 --tries=3
    volumes:
      - .:/var/www/html
    depends_on:
      - app
      - redis
      - mysql

  reverb:
    build: .
    entrypoint: ["/bin/sh", "/var/www/html/docker/entrypoint.sh"]
    command: php artisan reverb:start --host=0.0.0.0 --port=8081
    ports:
      - "8081:8081"
    volumes:
      - .:/var/www/html
    depends_on:
      - redis

volumes:
  mysql_data:
